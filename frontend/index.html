<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScamCheck AI</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>🛡️ ScamCheck AI</h1>

      <p class="subtitle">Kiểm tra tin nhắn có dấu hiệu lừa đảo hay không</p>

      <textarea
        id="messageInput"
        placeholder="Dán nội dung tin nhắn cần kiểm tra..."
      ></textarea>

      <button id="analyzeButton">Phân tích</button>

      <div class="result-card">
        <h2>Kết luận</h2>

        <div id="resultText">Kết quả sẽ xuất hiện tại đây...</div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
